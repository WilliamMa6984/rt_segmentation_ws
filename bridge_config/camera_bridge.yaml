- gz_topic_name: "/rgb_camera/image_raw" # /rgb_camera2/image_raw, /thermal_camera/image_raw
  ros_topic_name: "/camera/image"
  ros_type_name: "sensor_msgs/msg/Image"
  gz_type_name: "gz.msgs.Image"
  direction: GZ_TO_ROS
  lazy: false

- gz_topic_name: "/thermal_camera/image_raw" # /rgb_camera2/image_raw, /thermal_camera/image_raw
  ros_topic_name: "/camera/thermal"
  ros_type_name: "sensor_msgs/msg/Image"
  gz_type_name: "gz.msgs.Image"
  direction: GZ_TO_ROS
  lazy: false

